name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^(fix|bug|feat|feature|chore|docs|refactor|test|ci|dependabot|removal)/ ]]; then
            echo "::error::Branch name '$BRANCH' must start with one of: feat/, fix/, bug/, chore/, docs/, refactor/, test/, ci/, dependabot/, removal/"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src

  get-adaptix-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.filter.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install filtering tool
        run: pip install packaging

      - id: filter
        shell: python
        run: |
          import json, os, re, urllib.request, tomllib
          from packaging.specifiers import SpecifierSet
          from packaging.version import Version

          # 1. Fetch adaptix data from PyPI
          with urllib.request.urlopen("https://pypi.org/pypi/adaptix/json") as response:
              data = json.loads(response.read())

          # 2. Parse version constraint from pyproject.toml
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
              deps = pyproject.get("project", {}).get("dependencies", [])
              # Find 'adaptix>=3.0.0b11' and extract the specifier
              raw_spec = next((d for d in deps if d.startswith("adaptix")), "adaptix>=0")
              spec_str = raw_spec.replace("adaptix", "").strip()

          spec = SpecifierSet(spec_str)

          # 3. Collect all non-yanked 3.x versions
          all_versions = [
              v for v, info in data["releases"].items()
              if v.startswith("3.") and not any(r.get("yanked") for r in info)
          ]

          # 4. Sort and group (keep only the latest patch/beta per branch)
          all_versions.sort(key=Version)
          grouped = {}
          for v in all_versions:
              # Group by prefix (strip the trailing part: .1 or b11)
              prefix = re.sub(r"(?<=[a-z])[0-9]+$|(?<=\.)[0-9]+$", "", v)
              grouped[prefix] = v

          # 5. Filter by pyproject.toml constraint
          final_versions = [v for v in grouped.values() if Version(v) in spec]

          # Write result for the matrix
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"versions={json.dumps(final_versions)}\n")

  test:
    needs: [get-adaptix-versions]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        os: [ubuntu-latest, windows-latest, macos-latest]
        adaptix-version: ${{ fromJson(needs.get-adaptix-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --upgrade-package adaptix==${{ matrix.adaptix-version }}

      - name: Run tests
        run: uv run pytest -v

  coverage:
    permissions:
      pull-requests: write
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term

      - name: Extract coverage percentage
        id: cov
        run: |
          TOTAL=$(uv run coverage report --format=total)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fetch baseline coverage from gist
        if: github.event_name == 'pull_request'
        id: baseline
        env:
          GIST_ID: ${{ vars.GIST_ID }}
        run: |
          BASELINE=$(curl -s "https://gist.githubusercontent.com/Niccolum/${GIST_ID}/raw/coverage.json" \
            | jq -r '.message // empty' | tr -d '%' || echo "")
          echo "total=$BASELINE" >> "$GITHUB_OUTPUT"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.cov.outputs.total }}
          BASELINE: ${{ steps.baseline.outputs.total }}
        run: |
          BODY="**Coverage:** ${CURRENT}%"
          if [ -n "$BASELINE" ]; then
            DIFF=$(python3 -c "print(f'{float($CURRENT) - float($BASELINE):+.0f}')")
            if [ "$DIFF" = "+0" ]; then
              BODY="$BODY (no change)"
            else
              BODY="$BODY (${DIFF}% vs main)"
            fi
          fi

          # Delete previous coverage comment if exists
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("**Coverage:**")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$COMMENT_ID"
          fi

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.total }}%
          valColorRange: ${{ steps.cov.outputs.total }}
          minColorRange: 50
          maxColorRange: 90

  test-result:
    if: always()
    needs: [test, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Tests failed or were cancelled: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::Coverage failed or was cancelled: ${{ needs.coverage.result }}"
            exit 1
          fi

  changelog-check:
    if: >-
      github.event_name == 'pull_request'
      && github.actor != 'dependabot[bot]'
      && !startsWith(github.head_ref, 'chore/release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changes requiring changelog
        id: changes
        env:
          IGNORED_PATHS: |
            .github/
        run: |
          FILES=$(git diff --name-only origin/main...HEAD)
          FILTER=$(echo "$IGNORED_PATHS" | sed '/^$/d' | sed 's|^|^|' | paste -sd'|' -)
          RELEVANT=$(echo "$FILES" | grep -vE "$FILTER" || true)
          if [ -z "$RELEVANT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changes.outputs.skip != 'true'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check changelog fragment
        if: steps.changes.outputs.skip != 'true'
        run: |
          uv run towncrier check --compare-with origin/main

  release-link:
    needs: [lint, test-result]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect release commit
        id: detect
        run: |
          MERGE_MSG=$(git log -1 --format='%s')

          # Squash merge: "chore: release X.Y.Z (#N)"
          # Regular merge: "Merge pull request #N from org/chore/release-X.Y.Z"
          if [[ "$MERGE_MSG" =~ ^chore:\ release\ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "$MERGE_MSG" =~ chore/release-([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.detect.outputs.is_release == 'true'
        id: notes
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        shell: python
        run: |
          import os, re, urllib.parse

          version = os.environ["VERSION"]

          with open("CHANGELOG.md") as f:
              content = f.read()

          pattern = rf"^## {re.escape(version)}\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          notes = ""
          if match:
              lines = match.group(1).strip().splitlines()
              lines = [l for l in lines if not l.startswith("<!-- PR #")]
              notes = "\n".join(lines).strip()

          if not notes:
              notes = "No changes documented."

          # Trim notes to fit GitHub URL limit (~8000 chars, ~7000 for body)
          max_len = 7000
          trimmed = notes
          while "\n" in trimmed and len(urllib.parse.quote(trimmed, safe="")) > max_len:
              trimmed = trimmed.rsplit("\n", 1)[0]

          encoded = urllib.parse.quote(trimmed, safe="")
          if len(encoded) > max_len:
              encoded = ""

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"encoded={encoded}\n")
              f.write(f"raw<<NOTES_EOF\n{notes}\nNOTES_EOF\n")

      - name: Add release link to summary
        if: steps.detect.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version }}
          NOTES_ENCODED: ${{ steps.notes.outputs.encoded }}
          NOTES_RAW: ${{ steps.notes.outputs.raw }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          TAG="v$VERSION"

          RELEASE_URL="$REPO_URL/releases/new?tag=$TAG&title=$TAG"
          if [ -n "$NOTES_ENCODED" ]; then
            RELEASE_URL="$RELEASE_URL&body=$NOTES_ENCODED"
          fi

          {
            echo "## Release $VERSION"
            echo ""
            echo "CI passed. [Create GitHub Release]($RELEASE_URL)"
            echo ""
            echo "<details><summary>Release notes</summary>"
            echo ""
            echo "$NOTES_RAW"
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  trigger-rtd-latest:
    needs: [lint, test-result]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RTD build for latest
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_API_TOKEN }}" \
            https://readthedocs.org/api/v3/projects/dature/versions/latest/builds/
