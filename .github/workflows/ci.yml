name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^(fix|bug|feat|feature|chore|docs|refactor|test|ci|dependabot)/ ]]; then
            echo "::error::Branch name '$BRANCH' must start with one of: feat/, fix/, bug/, chore/, docs/, refactor/, test/, ci/, dependabot/"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src

  get-adaptix-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.filter.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install filtering tool
        run: pip install packaging

      - id: filter
        shell: python
        run: |
          import json, os, re, urllib.request, tomllib
          from packaging.specifiers import SpecifierSet
          from packaging.version import Version

          # 1. Получаем данные из PyPI для adaptix
          with urllib.request.urlopen("https://pypi.org/pypi/adaptix/json") as response:
              data = json.loads(response.read())

          # 2. Парсим ограничение из pyproject.toml
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
              deps = pyproject.get("project", {}).get("dependencies", [])
              # Ищем строку 'adaptix>=3.0.0b11' и достаем саму спецификацию
              raw_spec = next((d for d in deps if d.startswith("adaptix")), "adaptix>=0")
              spec_str = raw_spec.replace("adaptix", "").strip()

          spec = SpecifierSet(spec_str)

          # 3. Собираем все не-yanked версии 3.x
          all_versions = [
              v for v, info in data["releases"].items()
              if v.startswith("3.") and not any(r.get("yanked") for r in info)
          ]

          # 4. Сортируем и группируем (как раньше: оставляем только последний патч/бету в ветке)
          all_versions.sort(key=Version)
          grouped = {}
          for v in all_versions:
              # Группируем по префиксу (отрезаем последнюю часть: .1 или b11)
              prefix = re.sub(r"(?<=[a-z])[0-9]+$|(?<=\.)[0-9]+$", "", v)
              grouped[prefix] = v

          # 5. Фильтруем по pyproject.toml
          final_versions = [v for v in grouped.values() if Version(v) in spec]

          # Записываем результат для матрицы
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"versions={json.dumps(final_versions)}\n")

  test:
    needs: [get-adaptix-versions]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        os: [ubuntu-latest, windows-latest, macos-latest]
        adaptix-version: ${{ fromJson(needs.get-adaptix-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --upgrade-package adaptix==${{ matrix.adaptix-version }}

      - name: Run tests
        run: uv run pytest -v

  test-result:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Tests failed or were cancelled: ${{ needs.test.result }}"
            exit 1
          fi

  tag:
    needs: [lint, test-result]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.create-tag.outputs.tagged }}
      version: ${{ steps.create-tag.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check version change and create tag
        id: create-tag
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)

          if ! git tag -l "v$VERSION" | grep -q .; then
            echo "Tag v$VERSION does not exist, creating"
            gh api "repos/${{ github.repository }}/git/refs" \
              -f "ref=refs/tags/v$VERSION" \
              -f "sha=${{ github.sha }}"
            echo "tagged=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$VERSION already exists"
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

  pypi-publish:
    needs: [tag]
    runs-on: ubuntu-latest
    if: >-
      !failure()
      && !cancelled()
      && needs.tag.outputs.tagged == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/dature
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Build package
        run: uv build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  github-release:
    needs: [tag]
    runs-on: ubuntu-latest
    if: >-
      !failure()
      && !cancelled()
      && needs.tag.outputs.tagged == 'true'
    permissions:
      contents: write
    steps:
      - name: Determine version
        id: version
        run: echo "value=${{ needs.tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Build package
        run: uv build

      - name: Extract release notes from CHANGELOG
        id: release-notes
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: python
        run: |
          import os, re

          version = os.environ["VERSION"]

          with open("CHANGELOG.md") as f:
              content = f.read()

          # Extract everything under "## X.Y.Z" section
          pattern = rf"^## {re.escape(version)}\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          notes = ""
          if match:
              lines = match.group(1).strip().splitlines()
              lines = [l for l in lines if not l.startswith("<!-- PR #")]
              notes = "\n".join(lines).strip()

          if not notes:
              notes = "No changes documented."

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"notes<<NOTES_EOF\n{notes}\nNOTES_EOF\n")

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release-notes.outputs.notes }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" dist/* \
            --title "v${{ steps.version.outputs.value }}" \
            --notes "$RELEASE_NOTES"

  trigger-rtd-latest:
    needs: [tag]
    if: >-
      !failure()
      && !cancelled()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RTD build for latest
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_API_TOKEN }}" \
            https://readthedocs.org/api/v3/projects/dature/versions/latest/builds/

  trigger-rtd-tag:
    needs: [tag]
    if: >-
      !failure()
      && !cancelled()
      && needs.tag.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Sync versions and activate tag
        env:
          RTD_API_TOKEN: ${{ secrets.RTD_API_TOKEN }}
          TAG: v${{ needs.tag.outputs.version }}
        run: |
          has_active_build() {
            local version=$1
            local response
            response=$(curl -s \
              -H "Authorization: Token $RTD_API_TOKEN" \
              "https://readthedocs.org/api/v3/projects/dature/versions/$version/builds/?limit=1")
            echo "$response" | grep -q '"code": "building"\|"code": "triggered"\|"code": "cloning"'
          }

          curl -X POST \
            -H "Authorization: Token $RTD_API_TOKEN" \
            https://readthedocs.org/api/v3/projects/dature/sync-versions/

          sleep 15

          curl -X PATCH \
            -H "Authorization: Token $RTD_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": false}' \
            "https://readthedocs.org/api/v3/projects/dature/versions/$TAG/"

          if ! has_active_build "$TAG"; then
            curl -X POST \
              -H "Authorization: Token $RTD_API_TOKEN" \
              "https://readthedocs.org/api/v3/projects/dature/versions/$TAG/builds/"
          fi

          if ! has_active_build "stable"; then
            curl -X POST \
              -H "Authorization: Token $RTD_API_TOKEN" \
              https://readthedocs.org/api/v3/projects/dature/versions/stable/builds/
          fi
