name: Docs

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

jobs:
  trigger-rtd-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Sync versions and activate tag
        env:
          RTD_API_TOKEN: ${{ secrets.RTD_API_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          curl -X POST \
            -H "Authorization: Token $RTD_API_TOKEN" \
            https://readthedocs.org/api/v3/projects/dature/sync-versions/

          sleep 15

          curl -X PATCH \
            -H "Authorization: Token $RTD_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": false}' \
            "https://readthedocs.org/api/v3/projects/dature/versions/$TAG/"

          curl -X POST \
            -H "Authorization: Token $RTD_API_TOKEN" \
            "https://readthedocs.org/api/v3/projects/dature/versions/$TAG/builds/"

          curl -X POST \
            -H "Authorization: Token $RTD_API_TOKEN" \
            https://readthedocs.org/api/v3/projects/dature/versions/stable/builds/
